---
- name: Prepare
  hosts: all
  tasks:
    - name: Collect facts
      become: true
      ansible.builtin.setup:

    - name: Run apt update
      ansible.builtin.apt:
        update_cache: true
      when:
        - ansible_facts.distribution == "Ubuntu"

    - name: Install gpg
      ansible.builtin.apt:
        name: gpg
        update_cache: true
      when:
        - ansible_facts.distribution == "Debian"

    - name: Update cache
      become: true
      ansible.builtin.yum:
        update_cache: true
      when:
        - ansible_facts.distribution == "CentOS"

    - name: Update cache
      become: true
      ansible.builtin.dnf:
        update_cache: true
      when:
        - ansible_facts.distribution == "Rocky"

    - name: Update cache
      become: true
      ansible.builtin.dnf:
        update_cache: true
      when:
        - ansible_facts.distribution == "AlmaLinux"